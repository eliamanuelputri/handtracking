<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Puzzle - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            padding: 2rem;
            background: radial-gradient(circle at top right, #fce7f3, #fdf2f8 60%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(244, 114, 182, 0.3);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(244, 114, 182, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            background: rgba(244, 114, 182, 0.2);
            border-radius: 12px;
            padding: 0.25rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.6);
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Magic<span>Puzzle</span></h1>
                <p>Login to continue</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('user')">Player</button>
                <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <!-- User Login Form -->
            <form id="userLoginForm" class="form-section active" onsubmit="handleLogin(event, 'user')">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="userUsername" required placeholder="Enter player username">
                </div>
                <!-- Simplifying user connection for local testing - we can just let them enter a username -->
                <button type="submit" class="btn-submit">Play Now</button>
                <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted);">
                    (Entering any username will create a temporary session for local play)
                </p>
            </form>

            <!-- Admin Login Form -->
            <form id="adminLoginForm" class="form-section" onsubmit="handleLogin(event, 'admin')">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="adminUsername" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" required placeholder="admin123">
                </div>
                <button type="submit" class="btn-submit">Login as Admin</button>
            </form>

        </div>
    </div>

    <script>
        function switchTab(type) {
            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update forms
            document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));
            document.getElementById(`${type}LoginForm`).classList.add('active');

            // Clear errors
            document.getElementById('errorMsg').style.display = 'none';
        }

        function handleLogin(e, type) {
            e.preventDefault();
            const errorEl = document.getElementById('errorMsg');

            if (type === 'user') {
                const username = document.getElementById('userUsername').value;
                if(username.trim() !== '') {
                    // For a local demo, we just save the username to localStorage and redirect
                    localStorage.setItem('playerName', username);
                    window.location.href = 'frontend/index.html';
                }
            } else if (type === 'admin') {
                const username = document.getElementById('adminUsername').value;
                const password = document.getElementById('adminPassword').value;

                // Simple client-side check for demo purposes (as requested in the prompt setup: admin / admin123)
                if (username === 'admin' && password === 'admin123') {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin/index.html';
                } else {
                    errorEl.textContent = 'Invalid admin credentials! Hint: admin / admin123';
                    errorEl.style.display = 'block';
                }
            }
        }
    </script>
</body>
</html>
