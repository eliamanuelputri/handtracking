<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicPuzzle – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e8edf3;
            --nm-light: #ffffff;
            --nm-dark: #c3cbd6;
            --primary: #e05c7a;
            --primary-dark: #c0405c;
            --text: #3a4050;
            --text-muted: #7a8499;
            --text-light: #aab0bf;
            --nm-shadow: 10px 10px 20px var(--nm-dark), -10px -10px 20px var(--nm-light);
            --nm-shadow-sm: 5px 5px 12px var(--nm-dark), -5px -5px 12px var(--nm-light);
            --nm-inset: inset 5px 5px 12px var(--nm-dark), inset -5px -5px 12px var(--nm-light);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 2rem;
        }

        .login-card {
            width: 100%; max-width: 420px;
            background: var(--bg);
            border-radius: 28px;
            box-shadow: var(--nm-shadow);
            padding: 2.75rem 2.5rem 2.5rem;
            animation: fadeUp 0.6s ease-out forwards;
        }
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(24px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .login-header img {
            height: 60px; width: 60px;
            object-fit: contain; border-radius: 14px;
            box-shadow: var(--nm-shadow-sm);
        }
        .logo-fallback {
            height: 60px; width: 60px;
            border-radius: 14px;
            background: var(--primary);
            display: none;
            align-items: center; justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--nm-shadow-sm);
        }
        .login-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); }
        .login-header h1 span { color: var(--primary); }
        .login-header p { color: var(--text-muted); margin-top: -0.2rem; font-size: 0.92rem; }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg);
            box-shadow: var(--nm-inset);
            border-radius: 12px;
            padding: 0.3rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1; padding: 0.7rem;
            border: none; background: transparent;
            color: var(--text-muted);
            border-radius: 9px; cursor: pointer;
            font-weight: 700; font-size: 0.9rem;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: var(--bg);
            color: var(--primary);
            box-shadow: var(--nm-shadow-sm);
        }

        /* Form */
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeUp 0.25s ease-out; }

        .form-group { margin-bottom: 1.4rem; }
        .form-group label {
            display: block; margin-bottom: 0.5rem;
            color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
        }
        .form-group input {
            width: 100%; padding: 0.9rem 1.1rem;
            background: var(--bg);
            border: none; border-radius: 12px;
            color: var(--text); font-size: 0.95rem;
            box-shadow: var(--nm-inset);
            transition: box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus {
            box-shadow: inset 6px 6px 14px var(--nm-dark), inset -6px -6px 14px var(--nm-light),
                        0 0 0 2px rgba(224,92,122,0.35);
        }
        .form-group input::placeholder { color: var(--text-light); }

        .btn-submit {
            width: 100%; padding: 1rem;
            background: var(--primary); color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 0.5rem;
            box-shadow: 5px 5px 14px rgba(192,64,92,0.45), -3px -3px 10px rgba(255,200,210,0.25);
            transition: all 0.25s;
        }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-submit:active {
            box-shadow: inset 4px 4px 10px rgba(160,40,70,0.4);
            transform: scale(0.98);
        }

        .hint-text {
            margin-top: 0.9rem;
            text-align: center;
            font-size: 0.8rem; color: var(--text-light);
        }

        .error-msg {
            color: #dc2626;
            background: var(--bg);
            box-shadow: var(--nm-inset);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            display: none; font-size: 0.88rem;
        }

        footer {
            margin-top: 1.75rem;
            font-size: 0.77rem; color: var(--text-light);
            text-align: center;
        }
        footer span { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <img id="logoImg" src="frontend/assets/logo.png" alt="Logo"
                 onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
            <div class="logo-fallback" id="logoFallback">🧩</div>
            <h1>Magic<span>Puzzle</span></h1>
            <p>Masuk untuk mulai bermain</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event,'user')">Player</button>
            <button class="tab-btn" onclick="switchTab(event,'admin')">Admin</button>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="userLoginForm" class="form-section active" onsubmit="handleLogin(event,'user')">
            <div class="form-group">
                <label>Username Pemain</label>
                <input type="text" id="userUsername" required placeholder="Masukkan username kamu">
            </div>
            <button type="submit" class="btn-submit">▶ Mainkan Sekarang</button>
            <p class="hint-text">Username apa saja akan langsung masuk sebagai pemain.</p>
        </form>

        <form id="adminLoginForm" class="form-section" onsubmit="handleLogin(event,'admin')">
            <div class="form-group">
                <label>Username Admin</label>
                <input type="text" id="adminUsername" required placeholder="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">🔐 Login Admin</button>
        </form>
    </div>

    <footer>&copy; 2026 <span>Elia Manuel Putri</span>. All rights reserved.</footer>

    <script>
        function switchTab(event, type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById(`${type}LoginForm`).classList.add('active');
            document.getElementById('errorMsg').style.display = 'none';
        }

        function handleLogin(e, type) {
            e.preventDefault();
            const errorEl = document.getElementById('errorMsg');
            if (type === 'user') {
                const username = document.getElementById('userUsername').value;
                if (username.trim() !== '') {
                    localStorage.setItem('playerName', username);
                    window.location.href = 'frontend/menu.html';
                }
            } else {
                const username = document.getElementById('adminUsername').value;
                const password = document.getElementById('adminPassword').value;
                if (username === 'admin' && password === 'admin123') {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin/index.html';
                } else {
                    errorEl.textContent = 'Kredensial salah! Hint: admin / admin123';
                    errorEl.style.display = 'block';
                }
            }
        }
    </script>
</body>
</html>
