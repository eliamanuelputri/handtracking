<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e8edf3;
            --surface: #e8edf3;
            --nm-light: #ffffff;
            --nm-dark: #c3cbd6;
            --primary: #f43f5e;
            --primary-dark: #e11d48;
            --text: #3a4050;
            --text-muted: #7a8499;
            --text-light: #aab0bf;
            --nm-shadow: 10px 10px 20px var(--nm-dark), -10px -10px 20px var(--nm-light);
            --nm-shadow-sm: 5px 5px 12px var(--nm-dark), -5px -5px 12px var(--nm-light);
            --nm-inset: inset 5px 5px 12px var(--nm-dark), inset -5px -5px 12px var(--nm-light);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            background: var(--bg);
            border-radius: 28px;
            padding: 3rem;
            box-shadow: var(--nm-shadow);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo img {
            height: 65px; width: 65px;
            object-fit: contain; border-radius: 14px;
            box-shadow: var(--nm-shadow-sm);
        }
        .logo-fallback {
            height: 65px; width: 65px;
            border-radius: 14px;
            background: var(--primary);
            display: none;
            align-items: center; justify-content: center;
            font-size: 2rem;
            box-shadow: var(--nm-shadow-sm);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0rem;
        }
        h1 span { color: var(--primary); }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--nm-shadow-sm);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 0.85rem 1.1rem;
            background: var(--bg);
            border: none;
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            box-shadow: var(--nm-inset);
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            box-shadow: inset 6px 6px 14px var(--nm-dark), inset -6px -6px 14px var(--nm-light),
                        0 0 0 2px rgba(244, 63, 94, 0.2);
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 5px 5px 14px rgba(244, 63, 94, 0.45), -3px -3px 10px rgba(255, 200, 210, 0.25);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        button:active {
            box-shadow: inset 4px 4px 10px rgba(160, 40, 70, 0.4);
            transform: scale(0.98);
        }

        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .success { background: var(--bg); color: #10b981; box-shadow: var(--nm-inset); }
        .error { background: var(--bg); color: #f43f5e; box-shadow: var(--nm-inset); }

        .puzzle-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .puzzle-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--bg);
            border-radius: 16px;
            margin-bottom: 1rem;
            box-shadow: var(--nm-shadow-sm);
            transition: transform 0.2s;
        }

        .puzzle-item:hover {
            transform: translateX(4px);
        }

        .puzzle-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 1rem;
            box-shadow: var(--nm-shadow-sm);
        }

        .puzzle-info h4 { margin-bottom: 0.25rem; font-weight: 700; color: var(--text); }
        .puzzle-info p { color: var(--text-muted); font-size: 0.85rem; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; box-shadow: var(--nm-inset); }
        ::-webkit-scrollbar-thumb { background: var(--nm-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
        }
        
        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-light);
            padding-top: 1.5rem;
        }
        footer a { color: var(--primary); font-weight: 600; text-decoration: none; margin-right: 1.5rem; }
        footer span { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <div class="header-logo">
                <img id="logoImg" src="../frontend/assets/logo.png" alt="Logo"
                     onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
                <div class="logo-fallback" id="logoFallback">🧩</div>
            </div>
            <h1>Admin <span>Dashboard</span></h1>
            <p class="subtitle">Manage interactive puzzles for the hand tracking app</p>
        </header>

        <div class="grid-container">
            <!-- Upload Section -->
            <div class="card">
                <h2>Upload New Puzzle</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="title">Puzzle Title</label>
                        <input type="text" id="title" name="title" placeholder="E.g., Beautiful Sunset" required>
                    </div>

                    <div class="form-group">
                        <label for="image">Upload Image</label>
                        <input type="file" id="image" name="image" accept="image/*" required>
                    </div>

                    <div class="row">
                        <div class="form-group">
                            <label for="columns">Grid Columns</label>
                            <input type="number" id="columns" name="columns" value="3" min="2" max="10" required>
                        </div>
                        <div class="form-group">
                            <label for="rows">Grid Rows</label>
                            <input type="number" id="rows" name="rows" value="3" min="2" max="10" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Create Puzzle</button>
                    <div id="message"></div>
                </form>
            </div>

            <!-- List Section -->
            <div class="card">
                <h2>Available Puzzles</h2>
                <ul class="puzzle-list" id="puzzleList">
                    <!-- Puzzles will be loaded here dynamically -->
                </ul>
            </div>
        </div>
        <!-- Footer -->
        <footer>
            <a href="../index.html" onclick="localStorage.removeItem('isAdmin')">← Keluar</a>
            &copy; 2026 <span>Elia Manuel Putri</span>. All rights reserved.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchPuzzles();

            const form = document.getElementById('uploadForm');
            const messageEl = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.textContent = 'Uploading...';
                submitBtn.disabled = true;

                const formData = new FormData(form);

                try {
                    const response = await fetch('../backend/upload.php', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (!response.ok) throw new Error(result.error || 'Upload failed');

                    showMessage(result.message, 'success');
                    form.reset();
                    fetchPuzzles();

                } catch (error) {
                    showMessage(error.message, 'error');
                } finally {
                    submitBtn.textContent = 'Create Puzzle';
                    submitBtn.disabled = false;
                }
            });
        });

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function fetchPuzzles() {
            const list = document.getElementById('puzzleList');
            list.innerHTML = '<p class="subtitle" style="text-align:center;">Loading puzzles...</p>';

            try {
                const response = await fetch('../backend/get_puzzles.php');
                const result = await response.json();

                if (!response.ok) throw new Error(result.message || 'Failed to load');

                if (result.success && result.data.length > 0) {
                    list.innerHTML = '';
                    result.data.forEach(puzzle => {
                        list.innerHTML += `
                            <li class="puzzle-item">
                                <img src="../${puzzle.image_url}" alt="${puzzle.title}" onerror="this.src='https://via.placeholder.com/60?text=No+Img'">
                                <div class="puzzle-info">
                                    <h4>${puzzle.title}</h4>
                                    <p>${puzzle.grid_columns}x${puzzle.grid_rows} Grid • Added ${new Date(puzzle.created_at).toLocaleDateString()}</p>
                                </div>
                            </li>
                        `;
                    });
                } else {
                    list.innerHTML = '<p class="subtitle" style="text-align:center;">No puzzles found.</p>';
                }
            } catch (error) {
                list.innerHTML = `<p class="error" style="text-align:center; padding: 1rem; border-radius:8px;">${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
